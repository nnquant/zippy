[package]
name = "zippy-shm-bridge"
version = "0.1.0"
edition = "2021"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59.0", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Memory",
] }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "frame_ring"
harness = false
